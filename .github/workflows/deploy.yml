name: Deploy Hugo to COS

on:
  push:
    branches: [ master ]  # 当推送到 master 分支时触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 如果你的主题是通过 Git 子模块引入的

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'  # 使用最新版本的 Hugo
        extended: true  # 如果你使用了 Sass/SCSS，需要扩展版

    - name: Build Hugo site
      run: |
        hugo --minify  # 构建站点，--minify 会压缩 HTML/CSS/JS
        echo "Build completed successfully"

    - name: Install coscmd
      run: |
        pip install coscmd

    - name: Configure coscmd
      run: |
        coscmd config -a ${{ secrets.COS_SECRET_ID }} \
                     -s ${{ secrets.COS_SECRET_KEY }} \
                     -b ${{ secrets.COS_BUCKET }} \
                     -r ${{ secrets.COS_REGION }}

    - name: Sync to COS
      run: |
        coscmd upload -r public/ / --delete
      # --delete 参数会删除 COS 中存在但本地 public/ 中不存在的文件
      # 这样可以实现完全同步（覆盖上传）